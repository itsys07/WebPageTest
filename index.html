<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>文字列頻出単語検出</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js" defer></script>
</head>

<body>
  <div class="section">
    <h2>単語検出したい文章を入力</h2>
    <textarea id="input" placeholder="ctrl+vで貼り付け、またはtextファイルをドラッグandドロップ"></textarea>
    <div style="display: flex; justify-content: flex-end;">
      <button id="clearBtn">クリア</button>
    </div>
  </div>
  <div class="section">
    <h2>除外したい文字列</h2>
    <input id="exclude" type="search" placeholder="助詞、接続詞や冠名詞を,カンマ区切りで複数記入できます。">
  </div>
  <button onclick="analyze()">解析実行</button>
  </div>
  <div class="section">
    <h2>検出結果（上位20件）</h2>

    <div id="loading"></div>
    <ul id="result"></ul>
    <button id="downloadBtn">CSVダウンロード</button>
  </div>
  <div>
    <button id="darkBtn">ライト/ダーク</button>
  </div>


</body>

</html>
